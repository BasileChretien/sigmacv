<svg width="1270" height="760" viewBox="0 0 1270 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5fe6"/><stop offset="1" stop-color="#1d3690"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#dce6ff" stop-opacity="0.7"/><stop offset="1" stop-color="#dce6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1a1d24" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1270" height="760" fill="#ffffff"/>
  <circle cx="1130" cy="120" r="340" fill="url(#glow)"/>
  <rect x="0" y="752" width="1270" height="8" fill="url(#logoGrad)"/>

  <rect x="80" y="64" width="56" height="56" rx="16" fill="url(#logoGrad)"/>
  <text x="108" y="104" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Σ</text>
  <text x="150" y="103" font-size="28" font-weight="700"><tspan fill="#1a1d24">Sigma</tspan><tspan fill="#2b4fd6">CV</tspan></text>

  <text x="80" y="184" font-size="54" font-weight="800" fill="#1a1d24" letter-spacing="-1">Funder-ready in <tspan fill="#2b4fd6">one click.</tspan></text>
  <text x="82" y="224" font-size="20" fill="#4a505c">Apply — and undo — a structured layout for any major funder or institution.</text>
  <text x="82" y="252" font-size="20" fill="#4a505c">It reorders and re-titles your sections (reversibly) and never deletes your data.</text>

  <!-- picker mock -->
  <text x="80" y="302" font-size="13" font-weight="700" fill="#2b4fd6" letter-spacing="1.4">CHOOSE A CV MODEL</text>
  <rect x="80" y="314" width="430" height="50" rx="12" fill="#ffffff" stroke="#dce6ff"/>
  <text x="100" y="345" font-size="17" fill="#1d3690">Royal Society — Résumé for Researchers</text>
  <text x="488" y="345" font-size="15" fill="#646b78">▾</text>
  <rect x="524" y="314" width="104" height="50" rx="12" fill="url(#logoGrad)"/>
  <text x="576" y="345" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Apply</text>
  <text x="648" y="345" font-size="14" fill="#646b78">✓ your current view is saved first</text>

