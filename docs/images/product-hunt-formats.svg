<svg width="1270" height="760" viewBox="0 0 1270 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5fe6"/>
      <stop offset="1" stop-color="#1d3690"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#dce6ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#dce6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1a1d24" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1270" height="760" fill="#ffffff"/>
  <circle cx="1120" cy="120" r="360" fill="url(#glow)"/>
  <rect x="0" y="752" width="1270" height="8" fill="url(#logoGrad)"/>

  <!-- header -->
  <rect x="80" y="64" width="56" height="56" rx="16" fill="url(#logoGrad)"/>
  <text x="108" y="104" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Σ</text>
  <text x="150" y="103" font-size="28" font-weight="700"><tspan fill="#1a1d24">Sigma</tspan><tspan fill="#2b4fd6">CV</tspan></text>

  <!-- headline -->
  <text x="80" y="192" font-size="56" font-weight="800" fill="#1a1d24" letter-spacing="-1">One CV, <tspan fill="#2b4fd6">every format.</tspan></text>
  <text x="82" y="234" font-size="21" fill="#4a505c">One citation engine → identical, correctly-styled references in every output.</text>

  <!-- left: one canonical CV card + arrow -->
  <g filter="url(#cardShadow)">
    <rect x="92" y="342" width="168" height="206" rx="16" fill="#ffffff" stroke="#e8eaee"/>
  </g>
  <rect x="112" y="364" width="30" height="30" rx="8" fill="url(#logoGrad)"/>
  <text x="127" y="386" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Σ</text>
  <rect x="112" y="410" width="128" height="8" rx="4" fill="#dce6ff"/>
  <rect x="112" y="428" width="96" height="8" rx="4" fill="#eef0f3"/>
  <rect x="112" y="446" width="128" height="8" rx="4" fill="#eef0f3"/>
  <rect x="112" y="464" width="80" height="8" rx="4" fill="#eef0f3"/>
  <rect x="112" y="482" width="118" height="8" rx="4" fill="#eef0f3"/>
  <text x="176" y="528" font-size="14" font-weight="700" fill="#2b4fd6" text-anchor="middle">1 canonical CV</text>

  <!-- arrow -->
  <g stroke="#2b4fd6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="276" y1="445" x2="322" y2="445"/>
    <path d="M 314 437 l 10 8 l -10 8" stroke-linejoin="round"/>
  </g>

  <!-- column 1: Documents -->
  <text x="344" y="312" font-size="14" font-weight="700" fill="#2b4fd6" letter-spacing="1.4">DOCUMENTS</text>
  <g font-size="18" font-weight="600">
    <g>
      <rect x="340" y="340" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/>
      <circle cx="362" cy="363" r="5" fill="#2b4fd6"/><text x="378" y="369" fill="#1d3690">PDF — print-ready</text>
    </g>
    <g>
      <rect x="340" y="398" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/>
      <circle cx="362" cy="421" r="5" fill="#2b4fd6"/><text x="378" y="427" fill="#1d3690">Word (DOCX)</text>
    </g>
    <g>
      <rect x="340" y="456" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/>
      <circle cx="362" cy="479" r="5" fill="#2b4fd6"/><text x="378" y="485" fill="#1d3690">LaTeX</text>
    </g>
    <g>
      <rect x="340" y="514" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/>
      <circle cx="362" cy="537" r="5" fill="#2b4fd6"/><text x="378" y="543" fill="#1d3690">Markdown</text>
    </g>
  </g>

  <!-- column 2: Citations & data -->
  <text x="632" y="312" font-size="14" font-weight="700" fill="#2b4fd6" letter-spacing="1.4">CITATIONS &amp; DATA</text>
  <g font-size="18" font-weight="600">
    <g><rect x="628" y="340" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="650" cy="363" r="5" fill="#2b4fd6"/><text x="666" y="369" fill="#1d3690">BibTeX</text></g>
    <g><rect x="628" y="398" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="650" cy="421" r="5" fill="#2b4fd6"/><text x="666" y="427" fill="#1d3690">CSL-JSON</text></g>
    <g><rect x="628" y="456" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="650" cy="479" r="5" fill="#2b4fd6"/><text x="666" y="485" fill="#1d3690">JSON Résumé</text></g>
    <g><rect x="628" y="514" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="650" cy="537" r="5" fill="#2b4fd6"/><text x="666" y="543" fill="#1d3690">RO-Crate</text></g>
    <g><rect x="628" y="572" width="250" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="650" cy="595" r="5" fill="#2b4fd6"/><text x="666" y="601" fill="#1d3690">JSON</text></g>
  </g>

  <!-- column 3: Funder & biosketch -->
  <text x="920" y="312" font-size="14" font-weight="700" fill="#2b4fd6" letter-spacing="1.4">FUNDER &amp; BIOSKETCH</text>
  <g font-size="18" font-weight="600">
    <g><rect x="916" y="340" width="262" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="938" cy="363" r="5" fill="#2b4fd6"/><text x="954" y="369" fill="#1d3690">NIH biosketch</text></g>
    <g><rect x="916" y="398" width="262" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="938" cy="421" r="5" fill="#2b4fd6"/><text x="954" y="427" fill="#1d3690">ERC</text></g>
    <g><rect x="916" y="456" width="262" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="938" cy="479" r="5" fill="#2b4fd6"/><text x="954" y="485" fill="#1d3690">MSCA</text></g>
    <g><rect x="916" y="514" width="262" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="938" cy="537" r="5" fill="#2b4fd6"/><text x="954" y="543" fill="#1d3690">NSF</text></g>
    <g><rect x="916" y="572" width="262" height="46" rx="12" fill="#ffffff" stroke="#dce6ff"/><circle cx="938" cy="595" r="5" fill="#2b4fd6"/><text x="954" y="601" fill="#1d3690">JSPS / KAKENHI</text></g>
  </g>

  <!-- footer -->
  <text x="92" y="712" font-size="22" font-weight="700" fill="#2b4fd6">sigmacv.org</text>
  <text x="92" y="660" font-size="15" fill="#646b78">14 export formats — plus a living, machine-readable public page.</text>
</svg>
