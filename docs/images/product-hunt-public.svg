<svg width="1270" height="760" viewBox="0 0 1270 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5fe6"/><stop offset="1" stop-color="#1d3690"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#dce6ff" stop-opacity="0.7"/><stop offset="1" stop-color="#dce6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1a1d24" flood-opacity="0.13"/>
    </filter>
    <clipPath id="winClip"><rect x="80" y="300" width="560" height="392" rx="16"/></clipPath>
  </defs>

  <rect width="1270" height="760" fill="#ffffff"/>
  <circle cx="1130" cy="130" r="340" fill="url(#glow)"/>
  <rect x="0" y="752" width="1270" height="8" fill="url(#logoGrad)"/>

  <rect x="80" y="64" width="56" height="56" rx="16" fill="url(#logoGrad)"/>
  <text x="108" y="104" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Σ</text>
  <text x="150" y="103" font-size="28" font-weight="700"><tspan fill="#1a1d24">Sigma</tspan><tspan fill="#2b4fd6">CV</tspan></text>

  <text x="80" y="182" font-size="48" font-weight="800" fill="#1a1d24" letter-spacing="-1">A public page that <tspan fill="#2b4fd6">updates itself.</tspan></text>
  <text x="82" y="222" font-size="20" fill="#4a505c">Publish a living web page that re-syncs from the open record —</text>
  <text x="82" y="250" font-size="20" fill="#4a505c">you choose what's shown, field by field. Nothing is public until you opt in.</text>

  <!-- left: browser window mock -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="300" width="560" height="392" rx="16" fill="#ffffff" stroke="#e8eaee"/>
  </g>
  <g clip-path="url(#winClip)">
    <rect x="80" y="300" width="560" height="46" fill="#eef0f3"/>
    <circle cx="104" cy="323" r="5" fill="#cfd6e2"/><circle cx="122" cy="323" r="5" fill="#cfd6e2"/><circle cx="140" cy="323" r="5" fill="#cfd6e2"/>
    <rect x="168" y="312" width="372" height="22" rx="11" fill="#ffffff" stroke="#dce6ff"/>
    <text x="182" y="327" font-size="12" fill="#646b78">🔒 sigmacv.org/p/jordan-rivera</text>
    <!-- public CV body -->
    <circle cx="130" cy="404" r="30" fill="url(#logoGrad)"/>
    <text x="130" y="412" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">JR</text>
    <text x="178" y="398" font-size="19" font-weight="700" fill="#1a1d24">Dr Jordan A. Rivera</text>
    <text x="178" y="420" font-size="13" fill="#646b78">Neuroscience · Academic CV</text>
    <text x="110" y="466" font-size="12" font-weight="700" fill="#2b4fd6" letter-spacing="1.2">PUBLICATIONS</text>
    <rect x="110" y="478" width="430" height="9" rx="4" fill="#e4e7ec"/>
    <rect x="110" y="494" width="300" height="9" rx="4" fill="#eef0f3"/>
    <rect x="110" y="520" width="410" height="9" rx="4" fill="#e4e7ec"/>
    <rect x="110" y="536" width="270" height="9" rx="4" fill="#eef0f3"/>
    <rect x="110" y="562" width="430" height="9" rx="4" fill="#e4e7ec"/>
    <rect x="110" y="578" width="320" height="9" rx="4" fill="#eef0f3"/>
    <rect x="110" y="604" width="380" height="9" rx="4" fill="#e4e7ec"/>
    <rect x="110" y="620" width="240" height="9" rx="4" fill="#eef0f3"/>
    <rect x="110" y="652" width="150" height="22" rx="6" fill="#eef3ff"/>
    <text x="120" y="667" font-size="11" font-weight="600" fill="#2240b4">Made with SigmaCV</text>
  </g>

  <!-- right: publish settings card -->
  <g filter="url(#cardShadow)">
    <rect x="680" y="300" width="510" height="392" rx="18" fill="#ffffff" stroke="#e8eaee"/>
  </g>
  <text x="712" y="342" font-size="13" font-weight="700" fill="#2b4fd6" letter-spacing="1.2">PUBLISH SETTINGS</text>

  <!-- toggle: public page ON -->
  <text x="712" y="386" font-size="17" font-weight="600" fill="#2d323c">Public page</text>
  <text x="712" y="406" font-size="12.5" fill="#9aa1ad">Shareable link, re-syncs as you update</text>
  <rect x="1086" y="372" width="52" height="28" rx="14" fill="#2b4fd6"/>
  <circle cx="1124" cy="386" r="11" fill="#ffffff"/>

  <!-- toggle: indexing OFF -->
  <text x="712" y="448" font-size="17" font-weight="600" fill="#2d323c">Allow search engines to index</text>
  <text x="712" y="468" font-size="12.5" fill="#9aa1ad">Off until you choose to opt in</text>
  <rect x="1086" y="434" width="52" height="28" rx="14" fill="#cfd6e2"/>
  <circle cx="1100" cy="448" r="11" fill="#ffffff"/>

  <line x1="712" y1="500" x2="1158" y2="500" stroke="#eef0f3" stroke-width="1.5"/>

  <text x="712" y="532" font-size="14" font-weight="600" fill="#646b78">Show on the public page (per-field consent):</text>
  <!-- three unchecked consent chips -->
  <g>
    <rect x="712" y="548" width="20" height="20" rx="5" fill="#ffffff" stroke="#cfd6e2" stroke-width="1.6"/><text x="742" y="564" font-size="15" fill="#4a505c">Email</text>
    <rect x="838" y="548" width="20" height="20" rx="5" fill="#ffffff" stroke="#cfd6e2" stroke-width="1.6"/><text x="868" y="564" font-size="15" fill="#4a505c">Phone</text>
    <rect x="968" y="548" width="20" height="20" rx="5" fill="#ffffff" stroke="#cfd6e2" stroke-width="1.6"/><text x="998" y="564" font-size="15" fill="#4a505c">Location</text>
  </g>

  <g transform="translate(712,604)" stroke="#2b4fd6" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 13 4 A 8 8 0 1 1 3 0"/><path d="M 3 0 l -1 5 l 5 -1 z" fill="#2b4fd6" stroke="none"/>
  </g>
  <text x="740" y="613" font-size="15" font-weight="600" fill="#2240b4">Re-syncs automatically as your record updates</text>
  <text x="712" y="650" font-size="13" fill="#9aa1ad">GDPR + APPI · full export &amp; one-click deletion, any time</text>

  <text x="80" y="730" font-size="22" font-weight="700" fill="#2b4fd6">sigmacv.org</text>
</svg>
