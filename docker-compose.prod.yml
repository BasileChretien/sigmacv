# SigmaCV — production deploy with a MANAGED Postgres (e.g. Neon).
#
# Unlike docker-compose.yml (which runs its own postgres), this file expects an
# external DATABASE_URL (your Neon connection string). Services: app + Caddy
# (auto-HTTPS) + the living-CV resync cron. Run with:
#
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# All values come from a `.env` file in this directory (see .env.production.example).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined into the client bundle at build time, so they
      # must be passed as build args (the runtime `environment:` below can't
      # change an inlined value). Read from the deploy `.env`; blank = omitted.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_BUYMEACOFFEE_URL: ${NEXT_PUBLIC_BUYMEACOFFEE_URL:-}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-}
        NEXT_PUBLIC_LINKEDIN_URL: ${NEXT_PUBLIC_LINKEDIN_URL:-}
    restart: unless-stopped
    # Hardening: the image already runs as non-root pwuser; also forbid privilege
    # escalation and drop all Linux capabilities (the app binds 3000 — no
    # privileged port — and Chromium runs sandbox-less, so none are needed).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    environment:
      # Managed Postgres (Neon). Must include ?sslmode=require.
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      # Canonical public origin, e.g. https://cv.example.org (must match the
      # ORCID redirect URI's host). Avoids trusting the Host header.
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET}
      ORCID_ENVIRONMENT: ${ORCID_ENVIRONMENT:-production}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO}
      # Durable, cross-instance rate limiting (survives restarts). Default on.
      RATE_LIMIT_PERSIST: ${RATE_LIMIT_PERSIST:-true}
      # Optional features (leave blank to disable).
      RESYNC_SECRET: ${RESYNC_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      EMAIL_SERVER: ${EMAIL_SERVER:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # EPO Open Patent Services (OAuth client-credentials) — enables the Patents
      # section. Leave blank to keep the EPO client dormant (no call, no effect).
      EPO_OPS_KEY: ${EPO_OPS_KEY:-}
      EPO_OPS_SECRET: ${EPO_OPS_SECRET:-}
      NODE_ENV: "production"
    expose:
      - "3000"

  # Periodically re-syncs published "living" CVs via the secret-guarded internal
  # endpoint. No-op if RESYNC_SECRET is unset (endpoint 503s; curl failure swallowed).
  resync-cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      RESYNC_SECRET: ${RESYNC_SECRET:-}
      RESYNC_INTERVAL_SECONDS: ${RESYNC_INTERVAL_SECONDS:-3600}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do sleep "${RESYNC_INTERVAL_SECONDS:-3600}"; curl -fsS -X POST -H "Authorization: Bearer ${RESYNC_SECRET}" http://app:3000/api/internal/resync || true; done'

  # Daily ping for the opt-in re-sync digest emails (per-user monthly cadence
  # lives server-side). No-op when RESYNC_SECRET or SMTP is unset.
  digest-cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      RESYNC_SECRET: ${RESYNC_SECRET:-}
      DIGEST_INTERVAL_SECONDS: ${DIGEST_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do sleep "${DIGEST_INTERVAL_SECONDS:-86400}"; curl -fsS -X POST -H "Authorization: Bearer ${RESYNC_SECRET}" http://app:3000/api/internal/digest || true; done'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Your domain (e.g. cv.example.org) → automatic Let's Encrypt TLS.
      # Leave as :80 only for IP/plain-HTTP testing (ORCID login won't work then).
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
