# Automated dependency monitoring (OpenSSF Scorecard "Dependency-Update-Tool" +
# Best Practices dependency-monitoring criterion). Dependabot opens PRs for
# security and version updates; CI (typecheck + ~800 tests + build) gates them.
version: 2
updates:
  # npm runtime + dev dependencies.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut review noise;
      # majors still arrive as individual PRs so breaking changes stay visible.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # Pinned GitHub Actions (keeps the SHA-pinned workflow actions current).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
