name: Release SBOM

# On each published GitHub release, generate a CycloneDX SBOM and attach it as a
# release asset — software supply-chain transparency (FAIR4RS / OpenSSF aligned).
on:
  release:
    types: [published]

permissions:
  contents: write # upload the SBOM asset onto the release

jobs:
  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate`; prisma.config.ts has a placeholder
      # DATABASE_URL fallback, so this works without a database (same as CI).
      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: npm run sbom

      - name: Attach SBOM to the release
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cdx.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}
