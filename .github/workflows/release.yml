name: Release signing & SBOM

# On each published GitHub release: generate a CycloneDX SBOM, attach it, and
# cryptographically sign it with KEYLESS Sigstore signing (GitHub OIDC — no
# long-lived keys, no secrets) — software supply-chain transparency + integrity
# (FAIR4RS / OpenSSF aligned).
#
# Two independent, keyless verification paths are produced for the SBOM:
#   1. SLSA build-provenance attestation (GitHub-native):
#        gh attestation verify sbom.cdx.json --repo BasileChretien/sigmacv
#   2. Detached Sigstore signature bundle (cosign):
#        cosign verify-blob --bundle sbom.cdx.json.cosign.bundle \
#          --certificate-identity-regexp '^https://github\.com/BasileChretien/sigmacv/' \
#          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#          sbom.cdx.json
# Maintainers additionally sign each release TAG locally — see docs/RELEASES.md.
on:
  release:
    types: [published]

permissions:
  contents: write # upload assets onto the release
  id-token: write # keyless Sigstore signing (OIDC) + provenance attestation
  attestations: write # store the build-provenance attestation

jobs:
  sign-sbom:
    name: Sign release + CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate`; prisma.config.ts has a placeholder
      # DATABASE_URL fallback, so this works without a database (same as CI).
      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: npm run sbom

      # (1) Keyless SLSA build-provenance attestation for the SBOM. Verifiable with
      #     `gh attestation verify sbom.cdx.json --repo BasileChretien/sigmacv`.
      - name: Attest SBOM build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sbom.cdx.json

      # (2) Keyless detached Sigstore signature (cosign) → portable bundle attached
      #     to the release for verification without the GitHub attestations API.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the SBOM (keyless)
        run: cosign sign-blob --yes --bundle sbom.cdx.json.cosign.bundle sbom.cdx.json

      - name: Attach SBOM + signature to the release
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cdx.json sbom.cdx.json.cosign.bundle --clobber
        env:
          GH_TOKEN: ${{ github.token }}
