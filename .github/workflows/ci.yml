name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Format · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs `postinstall: prisma generate`. prisma.config.ts reads
      # DATABASE_URL with a placeholder fallback, so generate works without a DB.
      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Vendored CSL assets are committed, so no fetch-csl step is needed.
      # env.ts is lazy (build doesn't require secrets); dummy values are a safety
      # net in case any module evaluates getEnv() under NODE_ENV=production.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-dummy-auth-secret-not-a-real-secret
          AUTH_URL: https://ci.example.com
          ORCID_CLIENT_ID: ci-dummy
          ORCID_CLIENT_SECRET: ci-dummy
          ORCID_ENVIRONMENT: sandbox
          OPENALEX_MAILTO: ci@example.com
