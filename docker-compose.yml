# SigmaCV — single-VPS deployment (app + Postgres + Caddy/TLS).
# The MVP renders PDF in-process inside the `app` container (its image ships
# Chromium), so there is no separate render-worker service yet.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sigmacv}
      # REQUIRED — no default. `docker compose up` fails fast if unset/empty, so
      # production Postgres can never run with a committed/guessable password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD (e.g. openssl rand -base64 24)}
      POSTGRES_DB: ${POSTGRES_DB:-sigmacv}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigmacv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not published to the host in production; only the app talks to it.
    expose:
      - "5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined into the client bundle at build time, so they
      # must be passed as build args (the runtime `environment:` below can't
      # change an inlined value). Read from the deploy `.env`; blank = omitted.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_BUYMEACOFFEE_URL: ${NEXT_PUBLIC_BUYMEACOFFEE_URL:-}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-}
        NEXT_PUBLIC_LINKEDIN_URL: ${NEXT_PUBLIC_LINKEDIN_URL:-}
        # Cookieless first-party analytics (Plausible). Both must be set for the
        # tracking script to render; blank = no script (e.g. local/dev builds).
        # DOMAIN is the site's data-domain (e.g. sigmacv.org); SRC is the full
        # script URL served by the Plausible container (e.g.
        # https://plausible.sigmacv.org/js/script.js). See docs/ANALYTICS.md.
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
        NEXT_PUBLIC_PLAUSIBLE_SRC: ${NEXT_PUBLIC_PLAUSIBLE_SRC:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Hardening (matches docker-compose.prod.yml): non-root image + no privilege
    # escalation + drop all caps (binds 3000, sandbox-less Chromium needs none).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sigmacv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sigmacv}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET}
      ORCID_ENVIRONMENT: ${ORCID_ENVIRONMENT:-sandbox}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO}
      RESYNC_SECRET: ${RESYNC_SECRET:-}
      # SMTP for the opt-in re-sync digest emails (and, only with the explicit
      # flag below, magic-link sign-in). Leave blank to keep mail dormant.
      EMAIL_SERVER: ${EMAIL_SERVER:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Email LOGIN opt-in ("true" to offer magic-link sign-in). Default off:
      # SMTP alone powers only the digest mailer — registration stays ORCID-only.
      EMAIL_LOGIN_ENABLED: ${EMAIL_LOGIN_ENABLED:-}
      # EPO Open Patent Services (OAuth client-credentials) — enables the Patents
      # section. Leave blank to keep the EPO client dormant (no call, no effect).
      EPO_OPS_KEY: ${EPO_OPS_KEY:-}
      EPO_OPS_SECRET: ${EPO_OPS_SECRET:-}
      RATE_LIMIT_PERSIST: ${RATE_LIMIT_PERSIST:-true}
      NODE_ENV: "production"
    expose:
      - "3000"

  # Periodically re-syncs published "living" CVs by hitting the internal,
  # secret-guarded endpoint. Disabled gracefully if RESYNC_SECRET is unset
  # (the endpoint returns 503 and curl's failure is swallowed).
  resync-cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      RESYNC_SECRET: ${RESYNC_SECRET:-}
      RESYNC_INTERVAL_SECONDS: ${RESYNC_INTERVAL_SECONDS:-3600}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do sleep "${RESYNC_INTERVAL_SECONDS:-3600}"; curl -fsS -X POST -H "Authorization: Bearer ${RESYNC_SECRET}" http://app:3000/api/internal/resync || true; done'

  # Daily ping for the opt-in re-sync digest emails. The PER-USER cadence
  # (monthly at most, only when a sync changed something) lives server-side in
  # digestSentAt — so a container restart can never starve the schedule. No-op
  # when RESYNC_SECRET or SMTP (EMAIL_SERVER/EMAIL_FROM) is unset.
  digest-cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      RESYNC_SECRET: ${RESYNC_SECRET:-}
      DIGEST_INTERVAL_SECONDS: ${DIGEST_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do sleep "${DIGEST_INTERVAL_SECONDS:-86400}"; curl -fsS -X POST -H "Authorization: Bearer ${RESYNC_SECRET}" http://app:3000/api/internal/digest || true; done'

  # ── Analytics ───────────────────────────────────────────────────────────────
  # Cookieless, first-party, self-hosted. Plausible = traffic; Metabase =
  # dashboards over a READ-ONLY role on the SigmaCV Postgres. All internal-only
  # (`expose`, never `ports`); reached from the internet only via Caddy. Full
  # setup + the read-only role SQL are in docs/ANALYTICS.md. These services are
  # OPTIONAL — the app runs identically without them.

  # Plausible's own config DB (separate from the SigmaCV Postgres).
  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      # REQUIRED when the `analytics` profile is active. Empty default — NOT `:?`
      # (which would break a normal non-analytics `docker compose up`) and NOT a
      # well-known fallback: Postgres refuses to initdb with a blank password, so
      # an unset var fails closed instead of booting as postgres/postgres. Set it
      # in `.env` before `--profile analytics up`.
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD:-}
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 1m
    expose:
      - "5432"

  # ClickHouse — Plausible's event store. Tuned for <16 GB RAM via the mounted
  # config (pinned to the Plausible CE v3.2.1 source). Internal-only.
  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: unless-stopped
    profiles: ["analytics"]
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - plausible_events_logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      start_period: 1m
    expose:
      - "8123"

  # Plausible app. DATABASE_URL / CLICKHOUSE_DATABASE_URL are pinned to the
  # sibling services above (NOT the SigmaCV DB) to avoid any env collision with
  # the app's own DATABASE_URL. Dashboard guarded by Plausible's own login; the
  # tracking endpoints (/js/script.js, /api/event) are intentionally public.
  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.1
    restart: unless-stopped
    profiles: ["analytics"]
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    volumes:
      - plausible_app_data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      TMPDIR: /var/lib/plausible/tmp
      # Public URL of the Plausible instance, e.g. https://plausible.sigmacv.org
      BASE_URL: ${PLAUSIBLE_BASE_URL}
      # openssl rand -base64 48 | tr -d '\n'
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      # REQUIRED — Plausible v3 won't boot if blank (must be Base64 32 bytes, not
      # hex). openssl rand -base64 32 | tr -d '\n'. Plausible enforces it, so the
      # compose default stays empty rather than `:?` (which would block the whole
      # stack, analytics profile or not).
      TOTP_VAULT_KEY: ${PLAUSIBLE_TOTP_VAULT_KEY:-}
      # Keep "false" only for first-run registration, then set "true" and redeploy
      # so the public instance can't be signed up to by strangers.
      DISABLE_REGISTRATION: ${PLAUSIBLE_DISABLE_REGISTRATION:-true}
      DATABASE_URL: postgres://postgres:${PLAUSIBLE_DB_PASSWORD:-}@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
    expose:
      - "8000"

  # Metabase's own config DB (dashboards/questions live here — NOT analytics data).
  metabase_db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      POSTGRES_USER: metabase
      # REQUIRED when the `analytics` profile is active (Postgres refuses to boot
      # with a blank password). Left as a plain default — NOT `:?` — so it can't
      # break a normal (non-analytics) `docker compose up`, which never starts
      # this service. Set it in `.env` before `--profile analytics up`.
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD:-}
      POSTGRES_DB: metabase
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  # Metabase BI. Connect it (in its UI) to the SigmaCV DB using the READ-ONLY
  # role `metabase_ro` (host: postgres, db: sigmacv) — see docs/ANALYTICS.md.
  metabase:
    image: metabase/metabase:v0.62.1
    restart: unless-stopped
    profiles: ["analytics"]
    depends_on:
      metabase_db:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: "5432"
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: metabase_db
      # Public URL of the dashboard, e.g. https://admin.sigmacv.org
      MB_SITE_URL: ${METABASE_SITE_URL:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set SITE_ADDRESS to your domain (e.g. cv.example.org) for automatic TLS,
      # or leave as :80 for local/plain HTTP.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      # Analytics subdomains — the Caddyfile reads these from the container env.
      # Default to internal-only ports so the blocks stay dormant until you set
      # real hostnames in .env (then Caddy auto-issues their TLS certs).
      PLAUSIBLE_ADDRESS: ${PLAUSIBLE_ADDRESS:-:8081}
      ADMIN_ADDRESS: ${ADMIN_ADDRESS:-:8082}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  # Analytics (optional — see docs/ANALYTICS.md).
  plausible_db_data:
  plausible_events_data:
  plausible_events_logs:
  plausible_app_data:
  metabase_db_data:
